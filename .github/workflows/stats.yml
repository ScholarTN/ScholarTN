name: Generate GitHub Stats Cards

on:
  schedule:
    - cron: "0 */6 * * *"   # runs every 6 hours automatically
  workflow_dispatch:          # lets you run it manually too
  push:
    branches: [main]

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub Stats SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: ScholarTN
          template: classic
          base: header, activity, community, repositories
          config_timezone: Africa/Harare
          filename: github-stats.svg

      - name: Generate Top Languages SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: ScholarTN
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          config_timezone: Africa/Harare
          filename: top-langs.svg
