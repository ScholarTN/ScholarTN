name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # runs every day at midnight
  workflow_dispatch:        # lets you trigger it manually too

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ScholarTN
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=00E5FF&color_dots=#020818,#003554,#00B4D8,#64FFDA,#00E5FF

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

**Step 3 — Commit the file**, then go to **Actions** tab in your repo and click **Run workflow** to trigger it manually the first time. After that it runs automatically every day.

**Step 4 — Update your README snake URL** to point to your own repo output:
```
https://raw.githubusercontent.com/ScholarTN/ScholarTN/output/github-contribution-grid-snake-dark.svg
